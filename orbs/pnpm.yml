version: 2.1

orbs:
    utils: arrai/utils@1.22.0

executors:
    current:
        environment:
            LANG: en_US.UTF-8
        docker:
            - image: cimg/node:current
    lts:
        environment:
            LANG: en_US.UTF-8
        docker:
            - image: cimg/node:lts

aliases:
    common_npm_config_parameters: &common_npm_config_parameters
        npm_registry:
            description: "The npm registry to authenticate against."
            type: string
            default: "registry.npmjs.org"
        npm_token:
            description: "Auth token for the registry."
            type: string
            default: ${NPM_TOKEN}
        npm_scopes:
            description: "Newline separated scope-to-registry mappings to add to .npmrc (e.g. @arrai-innovations:registry=https://npm.arrai.dev/)."
            type: string
            default: ""

    common_audit_parameters: &common_audit_parameters
        wd:
            description: "Directory to run pnpm audit from. For a pnpm workspace, leave at the repo root to audit all packages."
            type: string
            default: ~/project
        executor:
            type: executor
            default: lts
        resource_class:
            description: "The resource class to use for the job."
            type: enum
            enum: [small, medium, medium+, large, xlarge, 2xlarge, 2xlarge+]
            default: small
        setup:
            description: "Any additional setup steps."
            type: steps
            default: []
        config:
            description: "Any additional configuration steps."
            type: steps
            default: []
        skip_dev:
            description: "Don't check development dependencies."
            type: boolean
            default: true
        create_badges:
            description: "Generate badges."
            type: boolean
            default: true

    common_audit_steps: &common_audit_steps
        - checkout
        - steps: <<parameters.setup>>
        - install_pnpm
        - utils/add_npm_config:
              registry: <<parameters.npm_registry>>
              token: <<parameters.npm_token>>
              scopes: <<parameters.npm_scopes>>
        - steps: <<parameters.config>>
        - run:
              name: "Run pnpm audit."
              command: |
                  cd <<parameters.wd>>
                  pnpm audit <<# parameters.skip_dev >>--prod<</ parameters.skip_dev >>
        - when:
              condition: <<parameters.create_badges>>
              steps:
                  - utils/add_ssh_config
                  - utils/make_status_shield:
                        when: on_fail
                        status: errors
                        color: red
                        logo: pnpm
                  - utils/make_status_shield:
                        when: on_success
                        status: passed
                        color: brightgreen
                        logo: pnpm
                  - utils/rsync_file:
                        when: always
                        file: ~/status.svg
                        remote_file: ${CIRCLE_BRANCH}/pnpm-audit.svg
                        host: docs

commands:
    install_pnpm:
        description: "Ensure pnpm is installed."
        steps:
            - run:
                  name: "Install pnpm."
                  command: |
                      if ! [ -x "$(command -v pnpm)" ]; then
                          npm install -g pnpm
                      fi
                      pnpm --version

jobs:
    audit:
        parameters:
            <<: [*common_audit_parameters, *common_npm_config_parameters]
        executor: <<parameters.executor>>
        resource_class: <<parameters.resource_class>>
        circleci_ip_ranges: false
        steps: *common_audit_steps

    audit_fixed_ip:
        parameters:
            <<: [*common_audit_parameters, *common_npm_config_parameters]
        executor: <<parameters.executor>>
        resource_class: <<parameters.resource_class>>
        circleci_ip_ranges: true
        steps: *common_audit_steps

    publish:
        parameters:
            <<: *common_npm_config_parameters
            wd:
                description: "Directory of the package to publish. In a pnpm workspace, set this to the package subdir; pnpm install always runs at the repo root so the workspace resolves correctly."
                type: string
                default: ~/project
            executor:
                type: executor
                default: lts
            resource_class:
                description: "The resource class to use for the job."
                type: enum
                enum: [small, medium, medium+, large, xlarge, 2xlarge, 2xlarge+]
                default: small
            setup:
                description: "Any additional setup steps."
                type: steps
                default: []
        executor: <<parameters.executor>>
        resource_class: <<parameters.resource_class>>
        steps:
            - checkout
            - steps: <<parameters.setup>>
            - install_pnpm
            - utils/add_npm_config:
                  registry: <<parameters.npm_registry>>
                  token: <<parameters.npm_token>>
                  scopes: <<parameters.npm_scopes>>
            - run:
                  name: "Install Packages."
                  command: pnpm install --frozen-lockfile
            - run:
                  name: "Publish to npm."
                  command: |
                      cd <<parameters.wd>>
                      pnpm publish --no-git-checks
